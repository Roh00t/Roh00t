<svg viewBox="0 0 720 300" width="720" xmlns="http://www.w3.org/2000/svg">
<defs>
<style>
  .mono { font-family: 'Courier New', Courier, monospace; font-size: 13px; }
  .a    { animation-duration:16s; animation-iteration-count:infinite; animation-timing-function:linear; }

  @keyframes t1  { 0%,2%  {opacity:0} 4%  {opacity:1} 69%{opacity:1} 81%{opacity:0} 100%{opacity:0} }
  @keyframes t2  { 0%,6%  {opacity:0} 8%  {opacity:1} 69%{opacity:1} 81%{opacity:0} 100%{opacity:0} }
  @keyframes t3  { 0%,11% {opacity:0} 13% {opacity:1} 69%{opacity:1} 81%{opacity:0} 100%{opacity:0} }
  @keyframes t4  { 0%,14% {opacity:0} 16% {opacity:1} 69%{opacity:1} 81%{opacity:0} 100%{opacity:0} }
  @keyframes t5  { 0%,22% {opacity:0} 24% {opacity:1} 69%{opacity:1} 81%{opacity:0} 100%{opacity:0} }
  @keyframes t6  { 0%,27% {opacity:0} 29% {opacity:1} 69%{opacity:1} 81%{opacity:0} 100%{opacity:0} }
  @keyframes t7  { 0%,29% {opacity:0} 31% {opacity:1} 69%{opacity:1} 81%{opacity:0} 100%{opacity:0} }
  @keyframes t8  { 0%,32% {opacity:0} 34% {opacity:1} 69%{opacity:1} 81%{opacity:0} 100%{opacity:0} }
  @keyframes t9  { 0%,34% {opacity:0} 36% {opacity:1} 69%{opacity:1} 81%{opacity:0} 100%{opacity:0} }
  @keyframes t10 { 0%,39% {opacity:0} 41% {opacity:1} 69%{opacity:1} 81%{opacity:0} 100%{opacity:0} }
  @keyframes blink {
    0%,41%  {opacity:0}
    43%,49% {opacity:1}
    50%,56% {opacity:0}
    57%,63% {opacity:1}
    64%,69% {opacity:0}
    81%,100%{opacity:0}
  }

  .l1  {animation-name:t1 } .l2  {animation-name:t2 } .l3  {animation-name:t3 }
  .l4  {animation-name:t4 } .l5  {animation-name:t5 } .l6  {animation-name:t6 }
  .l7  {animation-name:t7 } .l8  {animation-name:t8 } .l9  {animation-name:t9 }
  .l10 {animation-name:t10} .cur {animation-name:blink}
</style>
</defs>

<!-- Window chrome -->
<rect width="720" height="300" rx="10" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
<rect width="720" height="36" rx="10" fill="#161b22"/>
<rect y="26" width="720" height="10" fill="#161b22"/>

