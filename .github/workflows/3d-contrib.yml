name: Generate Metrics

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate isometric contribution calendar
        uses: lowlighter/metrics@latest
        with:
          # Your GitHub token — GITHUB_TOKEN is enough for public profile metrics
          token: ${{ secrets.GITHUB_TOKEN }}

          # Output file — commits directly to the repo root
          filename: metrics.plugin.isocalendar.svg
          committer_token: ${{ secrets.GITHUB_TOKEN }}

          # Only generate the isometric calendar, nothing else
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Visual config
          config_timezone: Asia/Singapore
          config_display: large